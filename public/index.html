<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo de la Oficina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ELEMENTOS DE AUDIO -->
    <audio id="sonido-union" preload="auto">
        <source src="/sounds/union.mp3" type="audio/mpeg">
    </audio>
    <audio id="sonido-sala-lista" preload="auto">
        <source src="/sounds/salalista.mp3" type="audio/mpeg">
    </audio>
    <audio id="sonido-inicio-juego" preload="auto">
        <source src="/sounds/inicio.mp3" type="audio/mpeg">
    </audio>
    <audio id="sonido-bomba-tick" preload="auto">
        <source src="/sounds/tictac.mp3" type="audio/mpeg">
    </audio>
    <audio id="sonido-explosion" preload="auto">
        <source src="/sounds/explosion.mp3" type="audio/mpeg">
    </audio>
    <audio id="sonido-semaforo-verde" preload="auto">
        <source src="/sounds/verde.mp3" type="audio/mpeg">
    </audio>
    <audio id="sonido-victoria" preload="auto">
        <source src="/sounds/victoria.mp3" type="audio/mpeg">
    </audio>
    <audio id="sonido-derrota" preload="auto">
        <source src="/sounds/derrota.mp3" type="audio/mpeg">
    </audio>
    <audio id="sonido-voto" preload="auto">
        <source src="/sounds/voto.mp3" type="audio/mpeg">
    </audio>
    <audio id="sonido-clic" preload="auto">
        <source src="/sounds/click.mp3" type="audio/mpeg">
    </audio>
    <audio id="sonido-puntos" preload="auto">
        <source src="/sounds/puntos.mp3" type="audio/mpeg">
    </audio>

    <div id="pantalla-login">
        <h1>Juegos del Hambre: Edición Oficina</h1>
        <input type="text" id="nombreInput" placeholder="Tu nombre...">
        <button onclick="unirse()">Entrar</button>
    </div>

    <div id="pantalla-lobby" style="display: none;">
        <h2>Sala de Espera</h2>
        
        <!-- 🏆 PANEL DE RANKING EN EL LOBBY -->
        <div id="panel-ranking" style="margin-bottom: 20px;">
            <h3 style="display: flex; justify-content: space-between; align-items: center;">
                🏆 Ranking de la Oficina
                <button onclick="resetearPuntuaciones()" style="width: auto; padding: 5px 10px; font-size: 12px; background-color: #3d3d5c;">
                    🔄 Reset
                </button>
            </h3>
            <div id="lista-ranking" style="max-height: 200px; overflow-y: auto;">
                <!-- Ranking se llenará dinámicamente -->
            </div>
        </div>
        
        <ul id="lista-jugadores"></ul>
        
        <p id="mensaje-espera" style="color: #f39c12; font-style: italic; margin-top: 20px;">
            Esperando jugadores (Mínimo 3 para iniciar un juego)...
        </p>

        <div id="panel-control" style="display: none; margin-top: 30px;">
            <h3>Seleccionar Minijuego:</h3>
            <button onclick="lanzarBomba()" style="margin-bottom: 15px;">💣 Jugar: La Bomba de Tiempo</button>
            <button onclick="lanzarSemaforo()" style="margin-bottom: 15px; background-color: #e1b12c;">🚦 Jugar: El Semáforo</button>
            <button onclick="lanzarImpostor()" style="margin-bottom: 15px; background-color: #8e44ad;">🕵️ Jugar: El Impostor</button>
            <!-- Agregar dentro del div#panel-control, después del botón de Impostor -->
            <button onclick="lanzarExpediente()" style="margin-bottom: 15px; background-color: #9b59b6;">🗂️ Jugar: Encuentra el Expediente</button>
            
            <!-- Control de volumen -->
            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #3d3d5c;">
                <label style="color: #a5a5b4; font-size: 14px;">🔊 Volumen</label>
                <input type="range" id="control-volumen" min="0" max="1" step="0.1" value="0.5" 
                       onchange="ajustarVolumen(this.value)" style="width: 100%; margin-top: 5px;">
                <button onclick="toggleMute()" id="btn-mute" style="font-size: 14px; padding: 8px; margin-top: 5px; background-color: #3d3d5c;">
                    🔇 Silenciar
                </button>
            </div>
        </div>
    </div>

    <div id="pantalla-juego" style="display: none;"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
